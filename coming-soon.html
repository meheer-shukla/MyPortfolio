<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project — Coming Soon | Meheer Shukla</title>
    <meta name="description" content="This project is currently under development.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-sans/style.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="coming-soon-page">
    <!-- Custom Cursor -->
    <div class="custom-cursor" id="cursor"></div>

    <!-- Theme Toggle -->
    <button class="coming-soon-theme-toggle" id="themeToggle" aria-label="Toggle Theme">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"
            style="width: 20px; height: 20px; display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <!-- 3D Floating Background -->
    <div class="scene-canvas">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        <div class="floating-shape shape-4"></div>
        <div class="floating-shape shape-5"></div>
        <div class="floating-shape shape-6"></div>
        <div class="floating-shape shape-7"></div>
        <div class="floating-shape shape-8"></div>
        <div class="floating-shape shape-9"></div>
        <div class="floating-shape shape-10"></div>
    </div>

    <!-- Ambient Glow Orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <!-- Content -->
    <div class="content-wrapper">
        <div class="status-badge">
            <span class="status-dot"></span>
            In Development
        </div>
        <h1 class="coming-soon-title">Project <span>Coming Soon.</span></h1>
        <p class="coming-soon-sub">Something extraordinary is being engineered. This project is currently under active development.</p>
        <a href="index.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Portfolio
        </a>
    </div>

    <script>
        // Theme persistence & toggle
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "light") document.body.setAttribute("data-theme", "light");
        else if (!savedTheme && !prefersDark.matches) document.body.setAttribute("data-theme", "light");

        // Custom Cursor
        const cursor = document.getElementById('cursor');
        const interactiveElements = document.querySelectorAll('a, button');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', function () {
                let theme = "dark";
                if (document.body.getAttribute("data-theme") === "light") {
                    document.body.removeAttribute("data-theme");
                } else {
                    document.body.setAttribute("data-theme", "light");
                    theme = "light";
                }
                localStorage.setItem("theme", theme);
            });
        }
    </script>
</body>
</html>
